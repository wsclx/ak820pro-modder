name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-test:
    name: Rust • test + clippy + fmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — the macos-14-arm64 image ships a brew
          # rustup-init proxy that can leak into ~/.cargo/bin and then get
          # baked into the cache. On restore, the freshly-installed cargo
          # is overwritten by a rustup-init that doesn't understand
          # `cargo metadata`, breaking `tauri build`. See bundle job below.
          cache-bin: false
          prefix-key: v1-rust

      # The Tauri shell's `generate_context!()` proc-macro reads tauri.conf.json
      # at compile time and verifies `frontendDist` actually exists. So we have
      # to build the frontend before clippy / test even though this is "the
      # Rust job" — otherwise compilation panics with "this path doesn't exist".
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build frontend (populates dist/ for tauri::generate_context!)
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: cargo test
        run: cargo test --workspace --lib

  frontend-build:
    name: Frontend • typecheck + build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build

  tauri-bundle:
    name: Tauri • build .app
    runs-on: macos-14
    needs: [rust-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # macos-14-arm64 ships a brew rustup-init proxy. If it ever lands
          # in ~/.cargo/bin (e.g. shadowed install ordering), Swatinem will
          # cache that bad binary and every restore overwrites the cargo
          # dtolnay/rust-toolchain just installed — so `which cargo` looks
          # right but `cargo --version` reports rustup-init, and Tauri's
          # `cargo metadata` call fails with "unexpected argument 'metadata'".
          # Skip caching ~/.cargo/bin entirely and re-install on every run;
          # rustup install is ~10s, not worth caching.
          cache-bin: false
          prefix-key: v1-rust

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Sanity-check the toolchain after every other action has finished
      # mutating PATH and CARGO_HOME. If cargo here ever prints rustup-init,
      # bail loudly so we don't waste minutes on a tauri build that will
      # crash the same way.
      - name: Verify Rust toolchain
        run: |
          which cargo
          cargo --version
          rustc --version
          cargo --version | grep -q rustup-init && {
            echo "::error::cargo at $(which cargo) is rustup-init, not real cargo"
            exit 1
          } || true

      - run: pnpm install --frozen-lockfile

      - name: tauri:build (unsigned)
        run: pnpm tauri:build --bundles app
        env:
          # No codesigning in CI yet — local-only builds for now.
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload .app artefact
        uses: actions/upload-artifact@v4
        with:
          name: ak820pro-modder-macos-${{ github.sha }}
          # Cargo workspace puts build output under the *workspace-root*
          # target/, not src-tauri/target/. Tauri's bundler then drops the
          # .app at target/release/bundle/macos/AK820 Pro Modder.app —
          # mind the spaces in the filename, that's why the glob is here.
          path: target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
