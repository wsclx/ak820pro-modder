name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-test:
    name: Rust • test + clippy + fmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # The Tauri shell's `generate_context!()` proc-macro reads tauri.conf.json
      # at compile time and verifies `frontendDist` actually exists. So we have
      # to build the frontend before clippy / test even though this is "the
      # Rust job" — otherwise compilation panics with "this path doesn't exist".
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build frontend (populates dist/ for tauri::generate_context!)
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: cargo test
        run: cargo test --workspace --lib

  frontend-build:
    name: Frontend • typecheck + build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build

  tauri-bundle:
    name: Tauri • build .app
    runs-on: macos-14
    needs: [rust-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # macos-14 (ARM) runners have a brew-installed cargo at
      # /opt/homebrew/bin/cargo that's actually a rustup-init shim. When
      # setup-node and pnpm/action-setup run *after* the Rust install, they
      # can re-prepend /opt/homebrew/bin to PATH, shadowing the real cargo
      # at ~/.cargo/bin/cargo. The Tauri CLI then calls "cargo metadata"
      # and gets back "unexpected argument 'metadata'" from rustup-init.
      # Pin our cargo path to the front of PATH so this can't happen.
      - name: Pin Rust toolchain to PATH front
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          which cargo
          cargo --version
          rustc --version

      - run: pnpm install --frozen-lockfile

      - name: tauri:build (unsigned)
        run: pnpm tauri:build --bundles app
        env:
          # No codesigning in CI yet — local-only builds for now.
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload .app artefact
        uses: actions/upload-artifact@v4
        with:
          name: ak820pro-modder-macos-${{ github.sha }}
          # Cargo workspace puts build output under the *workspace-root*
          # target/, not src-tauri/target/. Tauri's bundler then drops the
          # .app at target/release/bundle/macos/AK820 Pro Modder.app —
          # mind the spaces in the filename, that's why the glob is here.
          path: target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
